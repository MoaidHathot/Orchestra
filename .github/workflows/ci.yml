name: Build and Test

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore OrchestrationEngine.slnx

      - name: Build
        run: dotnet build OrchestrationEngine.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test OrchestrationEngine.Tests.slnx
          --no-build
          --configuration Release
          -m:1
          --logger "trx;LogFileName=test-results.trx"
          --filter "Category!=E2E"
          --verbosity normal
