                            <div>
                              <div className="text-muted" style={{ fontSize: '11px', marginBottom: '4px' }}>Type</div>
                              <div>{mcp.type}</div>
                            </div>
                            {mcp.type === 'Remote' && mcp.endpoint && (
                              <div>
                                <div className="text-muted" style={{ fontSize: '11px', marginBottom: '4px' }}>Endpoint</div>
                                <div style={{ fontSize: '13px', wordBreak: 'break-all' }}>{mcp.endpoint}</div>
                              </div>
                            )}
                            {mcp.type === 'Local' && (
                              <>
                                <div>
                                  <div className="text-muted" style={{ fontSize: '11px', marginBottom: '4px' }}>Command</div>
                                  <div style={{ fontFamily: 'monospace', fontSize: '13px' }}>{mcp.command}</div>
                                </div>
                                {mcp.arguments?.length > 0 && (
                                  <div style={{ gridColumn: '1 / -1' }}>
                                    <div className="text-muted" style={{ fontSize: '11px', marginBottom: '4px' }}>Arguments</div>
                                    <div style={{ fontFamily: 'monospace', fontSize: '12px', background: 'var(--surface)', padding: '8px', borderRadius: '4px' }}>
                                      {mcp.arguments.join(' ')}
                                    </div>
                                  </div>
                                )}
                              </>
                            )}
                          </div>
                          
                          <div>
                            <div className="text-muted" style={{ fontSize: '11px', marginBottom: '8px' }}>Used By</div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                              {mcp.usedBy?.map((orchId, j) => (
                                <span 
                                  key={j} 
                                  style={{ 
                                    background: 'var(--surface)', 
                                    padding: '4px 10px', 
                                    borderRadius: '4px', 
                                    fontSize: '12px',
                                    border: '1px solid var(--border)'
                                  }}
                                >
                                  {orchId}
                                </span>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={onClose}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    function formatLogContent(log) {
      if (log.type === 'step-started') return 'Step started';
      if (log.type === 'step-completed') return `Completed (${log.actualModel || 'unknown model'})`;
      if (log.type === 'step-error') return log.error;
      if (log.type === 'tool-started') return `Tool: ${log.toolName}`;
      if (log.type === 'tool-completed') return `Tool ${log.toolName}: ${log.success ? 'success' : 'failed'}`;
      if (log.type === 'usage') return `Tokens: ${log.inputTokens || 0} in / ${log.outputTokens || 0} out`;
      if (log.type === 'content-delta') return log.chunk?.substring(0, 100) + (log.chunk?.length > 100 ? '...' : '');
      return JSON.stringify(log).substring(0, 200);
    }

    async function renderMermaidDag(orchestration, container, onNodeClick) {
      if (!orchestration?.steps || orchestration.steps.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-text">No steps to visualize</div></div>';
        return;
      }

      // Show loading spinner while rendering
      container.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

      // Build mermaid DAG from steps
      let mermaidCode = 'graph TD\n';
      const steps = orchestration.steps || [];
      const stepNameToId = new Map();
      const stepsWithInputHandler = [];
      const stepsWithOutputHandler = [];
      const stepsWithBothHandlers = [];
      
      steps.forEach(step => {
        const safeId = step.name.replace(/[^a-zA-Z0-9]/g, '_');
        stepNameToId.set(safeId, step.name);
        
        // Build label with handler indicators
        let label = step.name;
        const hasInput = step.inputHandlerPrompt;
        const hasOutput = step.outputHandlerPrompt;
        
        if (hasInput && hasOutput) {
          label = `${step.name} ⇄`;
          stepsWithBothHandlers.push(safeId);
        } else if (hasInput) {
          label = `${step.name} ⇢`;
          stepsWithInputHandler.push(safeId);
        } else if (hasOutput) {
          label = `${step.name} ⇠`;
          stepsWithOutputHandler.push(safeId);
        }
        
        mermaidCode += `  ${safeId}["${label}"]\n`;
        
        if (step.dependsOn && step.dependsOn.length > 0) {
          step.dependsOn.forEach(dep => {
            const safeDep = dep.replace(/[^a-zA-Z0-9]/g, '_');
            mermaidCode += `  ${safeDep} --> ${safeId}\n`;
          });
        }
      });

      // Add styling with hover effect and handler indicators
      mermaidCode += '\n  classDef default fill:#21262d,stroke:#30363d,color:#e6edf3,cursor:pointer\n';
      mermaidCode += '  classDef hover fill:#30363d,stroke:#58a6ff,color:#e6edf3\n';
      mermaidCode += '  classDef hasInputHandler fill:#1f3a1f,stroke:#3fb950,color:#e6edf3,cursor:pointer\n';
      mermaidCode += '  classDef hasOutputHandler fill:#1f2a3f,stroke:#58a6ff,color:#e6edf3,cursor:pointer\n';
      mermaidCode += '  classDef hasBothHandlers fill:#2d2a1f,stroke:#d29922,color:#e6edf3,cursor:pointer\n';
      
      // Apply classes
      if (stepsWithInputHandler.length > 0) {
        mermaidCode += `  class ${stepsWithInputHandler.join(',')} hasInputHandler\n`;
      }
      if (stepsWithOutputHandler.length > 0) {
        mermaidCode += `  class ${stepsWithOutputHandler.join(',')} hasOutputHandler\n`;
      }
      if (stepsWithBothHandlers.length > 0) {
        mermaidCode += `  class ${stepsWithBothHandlers.join(',')} hasBothHandlers\n`;
      }

      try {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'dark',
          securityLevel: 'loose', // Required for click handlers
          themeVariables: {
            primaryColor: '#21262d',
            primaryTextColor: '#e6edf3',
            primaryBorderColor: '#30363d',
            lineColor: '#58a6ff',
            secondaryColor: '#161b22',
            tertiaryColor: '#0d1117'
          }
        });

        const { svg } = await mermaid.render('dag-' + Date.now(), mermaidCode);
        container.innerHTML = svg;

        // Add click handlers to nodes
        if (onNodeClick) {
          const svgElement = container.querySelector('svg');
          if (svgElement) {
            // Find all nodes (g elements with class 'node')
            const nodes = svgElement.querySelectorAll('.node');
            nodes.forEach(node => {
              // Get the node ID from the data-id attribute or the text content
              const nodeId = node.id?.replace('flowchart-', '').replace(/-\d+$/, '');
              const stepName = stepNameToId.get(nodeId);
              
              if (stepName) {
                node.style.cursor = 'pointer';
                node.addEventListener('click', (e) => {
                  e.stopPropagation();
                  onNodeClick(stepName);
                });
                // Add hover effect
                node.addEventListener('mouseenter', () => {
                  const rect = node.querySelector('rect, polygon, circle, ellipse');
                  if (rect) {
                    rect.style.stroke = '#58a6ff';
                    rect.style.strokeWidth = '2px';
                  }
                });
                node.addEventListener('mouseleave', () => {
                  const rect = node.querySelector('rect, polygon, circle, ellipse');
                  if (rect) {
                    rect.style.stroke = '#30363d';
                    rect.style.strokeWidth = '1px';
                  }
                });
              }
            });
          }
        }
      } catch (err) {
        console.error('Mermaid render error:', err);
        container.innerHTML = `<div class="empty-state"><div class="empty-text">Failed to render DAG: ${err.message}</div></div>`;
      }
    }

    // Render execution DAG with step statuses
    async function renderExecutionDag(orchestration, stepStatuses, container, onNodeClick, selectedStep) {
      if (!orchestration?.steps || orchestration.steps.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-text">No steps to visualize</div></div>';
        return;
      }

      // Build mermaid DAG from steps with status styling
      let mermaidCode = 'graph TD\n';
      const steps = orchestration.steps || [];
      const stepNameToId = new Map();
      const pendingSteps = [];
      const runningSteps = [];
      const completedSteps = [];
      const failedSteps = [];
      const cancelledSteps = [];
      const skippedSteps = [];
      
      steps.forEach(step => {
        // Handle both string and object step formats
        const stepName = typeof step === 'string' ? step : step?.name;
        if (!stepName) return; // Skip invalid steps
        
        const safeId = stepName.replace(/[^a-zA-Z0-9]/g, '_');
        stepNameToId.set(safeId, stepName);
        
        // Store step object for later reference (MCPs, etc.)
        if (typeof step === 'object') {
          stepNameToId.set(`${safeId}_data`, step);
        }
        
        // Build label with status emoji
        const status = stepStatuses[stepName] || 'pending';
        let statusIcon = '';
        switch (status) {
          case 'running': statusIcon = ' ...'; break;
          case 'completed': statusIcon = ' ✓'; break;
          case 'failed': statusIcon = ' ✗'; break;
          case 'cancelled': statusIcon = ' ⊘'; break;
          case 'skipped': statusIcon = ' ○'; break;
          default: statusIcon = ''; break;
        }
        
        const label = `${stepName}${statusIcon}`;
        mermaidCode += `  ${safeId}["${label}"]\n`;
        
        // Categorize by status
        switch (status) {
          case 'running': runningSteps.push(safeId); break;
          case 'completed': completedSteps.push(safeId); break;
          case 'failed': failedSteps.push(safeId); break;
          case 'cancelled': cancelledSteps.push(safeId); break;
          case 'skipped': skippedSteps.push(safeId); break;
          default: pendingSteps.push(safeId); break;
        }
        
        // Handle dependencies (only available if step is an object)
        const dependsOn = typeof step === 'object' ? step.dependsOn : null;
        if (dependsOn && dependsOn.length > 0) {
          dependsOn.forEach(dep => {
            const safeDep = dep.replace(/[^a-zA-Z0-9]/g, '_');
            mermaidCode += `  ${safeDep} --> ${safeId}\n`;
          });
        }
      });

      // Add styling for different statuses
      mermaidCode += '\n  classDef pending fill:#21262d,stroke:#484f58,color:#8b949e,cursor:pointer\n';
      mermaidCode += '  classDef running fill:#0d2847,stroke:#58a6ff,color:#58a6ff,cursor:pointer\n';
      mermaidCode += '  classDef completed fill:#0d331a,stroke:#3fb950,color:#3fb950,cursor:pointer\n';
      mermaidCode += '  classDef failed fill:#3d1418,stroke:#f85149,color:#f85149,cursor:pointer\n';
      mermaidCode += '  classDef cancelled fill:#3d2e0d,stroke:#d29922,color:#d29922,cursor:pointer\n';
      mermaidCode += '  classDef skipped fill:#21262d,stroke:#484f58,color:#6e7681,cursor:pointer\n';
      mermaidCode += '  classDef selected stroke-width:3px\n';
      
      // Apply classes
      if (pendingSteps.length > 0) {
        mermaidCode += `  class ${pendingSteps.join(',')} pending\n`;
      }
      if (runningSteps.length > 0) {
        mermaidCode += `  class ${runningSteps.join(',')} running\n`;
      }
      if (completedSteps.length > 0) {
        mermaidCode += `  class ${completedSteps.join(',')} completed\n`;
      }
      if (failedSteps.length > 0) {
        mermaidCode += `  class ${failedSteps.join(',')} failed\n`;
      }
      if (cancelledSteps.length > 0) {
        mermaidCode += `  class ${cancelledSteps.join(',')} cancelled\n`;
      }
      if (skippedSteps.length > 0) {
        mermaidCode += `  class ${skippedSteps.join(',')} skipped\n`;
      }

      try {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'dark',
          securityLevel: 'loose',
          themeVariables: {
            primaryColor: '#21262d',
            primaryTextColor: '#e6edf3',
            primaryBorderColor: '#30363d',
            lineColor: '#58a6ff',
            secondaryColor: '#161b22',
            tertiaryColor: '#0d1117'
          }
        });

        const { svg } = await mermaid.render('exec-dag-' + Date.now(), mermaidCode);
        container.innerHTML = svg;

        // Add click handlers to nodes
        if (onNodeClick) {
          const svgElement = container.querySelector('svg');
          if (svgElement) {
            const nodes = svgElement.querySelectorAll('.node');
            nodes.forEach(node => {
              const nodeId = node.id?.replace('flowchart-', '').replace(/-\d+$/, '');
              const stepName = stepNameToId.get(nodeId);
              
              if (stepName) {
                node.style.cursor = 'pointer';
                
                // Highlight selected step
                if (selectedStep === stepName) {
                  const rect = node.querySelector('rect, polygon, circle, ellipse');
                  if (rect) {
                    rect.style.strokeWidth = '3px';
                  }
                }
                
                node.addEventListener('click', (e) => {
                  e.stopPropagation();
                  onNodeClick(stepName);
                });
                
                node.addEventListener('mouseenter', () => {
                  const rect = node.querySelector('rect, polygon, circle, ellipse');
                  if (rect) {
                    rect.style.filter = 'brightness(1.2)';
                  }
                });
                node.addEventListener('mouseleave', () => {
                  const rect = node.querySelector('rect, polygon, circle, ellipse');
                  if (rect) {
                    rect.style.filter = 'none';
                  }
                });
              }
            });
          }
        }
      } catch (err) {
        console.error('Mermaid render error:', err);
        container.innerHTML = `<div class="empty-state"><div class="empty-text">Failed to render DAG: ${err.message}</div></div>`;
      }
    }

    // ─── Status Bar Component ──────────────────────────────────────────────────
    function StatusBar({ status }) {
      const getOutlookStatusClass = () => {
        if (!status.outlook) return 'not-configured';
        switch (status.outlook.status) {
          case 'Connected': return 'connected';
          case 'Disconnected': return 'disconnected';
          case 'Connecting': return 'connecting';
          case 'NotConfigured': return 'not-configured';
          default: return 'not-configured';
        }
      };

      const getOutlookStatusText = () => {
        if (!status.outlook) return 'Not configured';
        switch (status.outlook.status) {
          case 'Connected': return 'Connected';
          case 'Disconnected': return 'Disconnected';
          case 'Connecting': return 'Connecting...';
          case 'NotConfigured': return 'Not configured';
          default: return status.outlook.status;
        }
      };

      return (
        <div className="status-bar">
          {/* Outlook status (only show if configured) */}
          {status.outlook && status.outlook.status !== 'NotConfigured' && (
            <div className="status-bar-item" title={status.outlook.errorMessage || ''}>
              <span className={`status-indicator ${getOutlookStatusClass()}`}></span>
              <span>Outlook: {getOutlookStatusText()}</span>
            </div>
          )}
          
          {/* Show error message if any */}
          {status.outlook?.errorMessage && (
            <div className="status-bar-error" title={status.outlook.errorMessage}>
              <Icons.X />
              <span style={{ maxWidth: '300px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {status.outlook.errorMessage}
              </span>
            </div>
          )}
          
          <div className="status-bar-spacer"></div>
          
          {/* Stats */}
          <div className="status-bar-item">
            <span>{status.orchestrationCount} orchestrations</span>
          </div>
          <div className="status-bar-item">
            <span>{status.activeTriggers} active triggers</span>
          </div>
          {status.runningExecutions > 0 && (
            <div className="status-bar-item">
              <span className="status-indicator running" style={{ background: 'var(--warning)' }}></span>
              <span>{status.runningExecutions} running</span>
            </div>
          )}
        </div>
      );
    }

    // ─── Render ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
