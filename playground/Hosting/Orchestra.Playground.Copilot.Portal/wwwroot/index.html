    // ─── Active Orchestration Card ───────────────────────────────────────────────
    function ActiveOrchestrationCard({ execution, type, onView, onCancel, orchestrations }) {
      const isRunning = type === 'running';
      const isCancelling = execution.status === 'Cancelling';
      const orch = orchestrations?.find(o => o.id === execution.orchestrationId);
      
      // Calculate duration for running orchestrations
      const getDuration = () => {
        if (!execution.startedAt) return null;
        const start = new Date(execution.startedAt);
        const now = new Date();
        const seconds = Math.floor((now - start) / 1000);
        if (seconds < 60) return `${seconds}s`;
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ${seconds % 60}s`;
        const hours = Math.floor(minutes / 60);
        return `${hours}h ${minutes % 60}m`;
      };

      // Determine status color
      const getStatusColor = () => {
        if (isCancelling) return 'var(--warning)';
        if (isRunning) return 'var(--primary)';
        return 'var(--warning)';
      };

      return (
        <div 
          className="orch-card" 
          style={{ 
            borderLeft: `4px solid ${getStatusColor()}`,
            cursor: 'pointer'
          }}
          onClick={() => onView(execution, orch)}
        >
          <div className="card-header">
            <div className="card-title-area">
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <div className={`step-status-badge ${isCancelling ? 'cancelling' : (isRunning ? 'running' : 'pending')}`} style={{ 
                  width: '10px', 
                  height: '10px', 
                  borderRadius: '50%',
                  flexShrink: 0,
                  background: isCancelling ? 'var(--warning)' : undefined
                }}></div>
                <div className="card-title">{execution.orchestrationName}</div>
              </div>
              <div className="card-version" style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                {isCancelling ? (
                  <>
                    <Icons.Spinner style={{ width: '12px', height: '12px', color: 'var(--warning)' }} />
                    <span style={{ color: 'var(--warning)' }}>Cancelling</span>
                  </>
                ) : isRunning ? (
                  <>
                    <Icons.Spinner style={{ width: '12px', height: '12px' }} />
                    Running
                  </>
                ) : (
                  <>
                    <Icons.Clock style={{ width: '12px', height: '12px' }} />
                    Pending
                  </>
                )}
              </div>
            </div>
          </div>
          <div className="card-body">
            <div className="card-meta-grid">
              {isRunning ? (
                <>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Execution ID</div>
                    <div className="card-meta-value" style={{ fontFamily: 'monospace', fontSize: '11px' }}>
                      {execution.executionId?.slice(0, 8)}...
                    </div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Duration</div>
                    <div className="card-meta-value">{getDuration() || '-'}</div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Started</div>
                    <div className="card-meta-value">{formatTimeAgo(execution.startedAt)}</div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Trigger</div>
                    <div className="card-meta-value" style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                      {getTriggerIcon(execution.triggeredBy)}
                      {execution.triggeredBy}
                    </div>
                  </div>
                </>
              ) : (
                <>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Trigger</div>
                    <div className="card-meta-value" style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                      {getTriggerIcon(execution.triggeredBy)}
                      {execution.triggeredBy}
                    </div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Status</div>
                    <div className="card-meta-value">{execution.status || 'Scheduled'}</div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Next Fire</div>
                    <div className="card-meta-value">
                      {execution.nextFireTime ? formatTimeUntil(execution.nextFireTime) : 'Unknown'}
                    </div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Last Fired</div>
                    <div className="card-meta-value">
                      {execution.lastFireTime ? formatTimeAgo(execution.lastFireTime) : 'Never'}
                    </div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Run Count</div>
                    <div className="card-meta-value">{execution.runCount ?? 0}</div>
                  </div>
                  <div className="card-meta-item">
                    <div className="card-meta-label">Steps</div>
                    <div className="card-meta-value">{execution.stepCount || orch?.stepCount || orch?.steps?.length || '-'}</div>
                  </div>
                  {/* Webhook URL for webhook triggers */}
                  {execution.triggeredBy === 'webhook' && execution.webhookUrl && (
                    <div className="card-meta-item" style={{ gridColumn: '1 / -1' }}>
                      <div className="card-meta-label">Webhook URL</div>
                      <div className="card-meta-value" style={{ 
                        fontFamily: 'monospace', 
                        fontSize: '11px',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '8px'
                      }}>
                        <code style={{ 
                          flex: 1, 
                          overflow: 'hidden', 
                          textOverflow: 'ellipsis', 
                          whiteSpace: 'nowrap',
                          background: 'var(--bg)',
                          padding: '4px 8px',
                          borderRadius: '4px'
                        }}>
                          {execution.webhookUrl}
                        </code>
                        <button 
                          className="btn-icon" 
                          onClick={(e) => { 
                            e.stopPropagation(); 
                            navigator.clipboard.writeText(window.location.origin + execution.webhookUrl);

                          title="Copy full URL"
                          style={{ flexShrink: 0 }}
                        >
                          <Icons.Copy />
                        </button>
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
            
            {/* Parameters preview for running */}
            {isRunning && execution.parameters && Object.keys(execution.parameters).length > 0 && (
              <div style={{ marginTop: '12px', padding: '8px', background: 'var(--bg)', borderRadius: '6px' }}>
                <div className="card-meta-label" style={{ marginBottom: '4px' }}>Parameters</div>
                <div style={{ fontSize: '11px', fontFamily: 'monospace', color: 'var(--text-muted)' }}>
                  {Object.entries(execution.parameters).slice(0, 3).map(([k, v]) => (
                    <div key={k} style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      <span style={{ color: '#ff7b72' }}>{k}:</span> {typeof v === 'string' ? v.slice(0, 30) : JSON.stringify(v).slice(0, 30)}
                    </div>
                  ))}
                  {Object.keys(execution.parameters).length > 3 && (
                    <div className="text-muted">+{Object.keys(execution.parameters).length - 3} more...</div>
                  )}
                </div>
              </div>
            )}

            <div className="card-actions" style={{ marginTop: '12px' }}>
              <button className="btn btn-sm" onClick={(e) => { e.stopPropagation(); onView(execution, orch); }}>
                <Icons.Eye /> View Details
              </button>
              {isRunning && onCancel && (
                <button 
                  className="btn btn-danger btn-sm" 
                  onClick={(e) => { e.stopPropagation(); onCancel(execution.executionId); }}
                >
                  <Icons.X /> Cancel
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─── Collapsible Text Component ─────────────────────────────────────────────
    function CollapsibleText({ label, text, defaultExpanded = false, maxCollapsedHeight = 60 }) {
      const [expanded, setExpanded] = useState(defaultExpanded);
      const needsCollapse = text && text.length > 150;
      
      return (
        <div style={{ marginBottom: '12px' }}>
          <div 
            className="text-muted" 
            style={{ 
              fontSize: '11px', 
              textTransform: 'uppercase', 
              marginBottom: '4px',
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center',
              cursor: needsCollapse ? 'pointer' : 'default'
            }}
            onClick={() => needsCollapse && setExpanded(!expanded)}
          >
            <span>{label}</span>
            {needsCollapse && (
              <span style={{ color: '#58a6ff', fontSize: '10px' }}>
                {expanded ? '▼ Collapse' : '▶ Expand'}
              </span>
            )}
          </div>
          <div style={{ 
            background: 'var(--bg)', 
            padding: '8px', 
            borderRadius: '4px', 
            fontSize: '12px', 
            whiteSpace: 'pre-wrap',
            maxHeight: expanded ? '400px' : `${maxCollapsedHeight}px`,
            overflow: expanded ? 'auto' : 'hidden',
            position: 'relative',
            transition: 'max-height 0.2s ease'
          }}>
            {text}
            {!expanded && needsCollapse && (
              <div style={{
                position: 'absolute',
                bottom: 0,
                left: 0,
                right: 0,
                height: '30px',
                background: 'linear-gradient(transparent, var(--bg))',
                pointerEvents: 'none'
              }} />
            )}
          </div>
        </div>
      );
    }

    // ─── Step Details Panel ────────────────────────────────────────────────────
    function StepDetailsPanel({ step }) {
      if (!step) return null;
      
      const isSimpleStep = typeof step === 'string';
      const stepName = isSimpleStep ? step : step.name;

      const renderValue = (value, depth = 0) => {
        if (value === null || value === undefined) return <span className="text-muted">null</span>;
        if (typeof value === 'boolean') return <span style={{ color: '#79c0ff' }}>{value.toString()}</span>;
        if (typeof value === 'number') return <span style={{ color: '#a5d6ff' }}>{value}</span>;
        if (typeof value === 'string') {
          return <span style={{ color: '#a5d6a7', wordBreak: 'break-word', whiteSpace: 'pre-wrap' }}>"{value}"</span>;
        }
        if (Array.isArray(value)) {
          if (value.length === 0) return <span className="text-muted">[]</span>;
          return (
            <div style={{ paddingLeft: depth > 0 ? '12px' : 0 }}>
              {value.map((item, i) => (
                <div key={i} style={{ marginBottom: '4px' }}>
                  <span className="text-muted">[{i}]</span> {renderValue(item, depth + 1)}
                </div>
              ))}
            </div>
          );
        }
        if (typeof value === 'object') {
          return (
            <div style={{ paddingLeft: depth > 0 ? '12px' : 0 }}>
              {Object.entries(value).map(([k, v]) => (
                <div key={k} style={{ marginBottom: '4px' }}>
                  <span style={{ color: '#ff7b72' }}>{k}:</span> {renderValue(v, depth + 1)}
                </div>
              ))}
            </div>
          );
        }
        return String(value);
      };

      if (isSimpleStep) {
        return (
          <div>
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Name</div>
              <div style={{ fontWeight: 600 }}>{stepName}</div>
            </div>
            <div className="text-muted" style={{ fontSize: '12px' }}>
              Step details not available (simple step reference)
            </div>
          </div>
        );
      }

      // Full step object - show all properties
      const knownProps = ['name', 'prompt', 'userPrompt', 'model', 'dependsOn', 'condition', 'output', 'tools', 'mcp', 'mcps', 'temperature', 'maxTokens', 'systemPrompt', 'reasoningLevel', 'loopConfig', 'parameters', 'inputHandlerPrompt', 'outputHandlerPrompt', 'type', 'systemPromptMode'];
      const otherProps = Object.keys(step).filter(k => !knownProps.includes(k) && step[k] !== undefined && step[k] !== null);

      return (
        <div style={{ fontSize: '13px' }}>
          {/* Name */}
          <div style={{ marginBottom: '12px' }}>
            <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Name</div>
            <div style={{ fontWeight: 600 }}>{step.name}</div>
          </div>

          {/* Type */}
          {step.type && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Type</div>
              <div style={{ color: '#d2a8ff' }}>{step.type}</div>
            </div>
          )}

          {/* Model */}
          {step.model && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Model</div>
              <div style={{ color: '#58a6ff' }}>{step.model}</div>
            </div>
          )}

          {/* Parameters */}
          {step.parameters?.length > 0 && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Required Parameters</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                {step.parameters.map((param, i) => (
                  <span key={i} style={{ background: '#3fb9504d', border: '1px solid #3fb950', padding: '2px 8px', borderRadius: '4px', fontSize: '12px', color: '#7ee787' }}>
                    {typeof param === 'string' ? param : param.name}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* Dependencies */}
          {step.dependsOn?.length > 0 && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Depends On</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                {step.dependsOn.map((dep, i) => (
                  <span key={i} style={{ background: 'var(--bg)', padding: '2px 8px', borderRadius: '4px', fontSize: '12px' }}>{dep}</span>
                ))}
              </div>
            </div>
          )}

          {/* Input Handler */}
          {step.inputHandlerPrompt && (
            <CollapsibleText label="Input Handler" text={step.inputHandlerPrompt} maxCollapsedHeight={50} />
          )}

          {/* Output Handler */}
          {step.outputHandlerPrompt && (
            <CollapsibleText label="Output Handler" text={step.outputHandlerPrompt} maxCollapsedHeight={50} />
          )}

          {/* User Prompt / Prompt */}
          {(step.userPrompt || step.prompt) && (
            <CollapsibleText label="User Prompt" text={step.userPrompt || step.prompt} />
          )}

          {/* System Prompt */}
          {step.systemPrompt && (
            <CollapsibleText label="System Prompt" text={step.systemPrompt} />
          )}

          {/* System Prompt Mode */}
          {step.systemPromptMode && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>System Prompt Mode</div>
              <div style={{ color: '#ffa657' }}>{step.systemPromptMode}</div>
            </div>
          )}

          {/* Condition */}
          {step.condition && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Condition</div>
              <div style={{ color: '#ffa657' }}>{step.condition}</div>
            </div>
          )}

          {/* Output */}
          {step.output && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Output</div>
              <div>{renderValue(step.output)}</div>
            </div>
          )}

          {/* Tools */}
          {step.tools?.length > 0 && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Tools ({step.tools.length})</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                {step.tools.map((tool, i) => (
                  <span key={i} style={{ background: 'var(--bg)', padding: '2px 8px', borderRadius: '4px', fontSize: '12px', color: '#7ee787' }}>
                    {typeof tool === 'string' ? tool : tool.name || JSON.stringify(tool)}
                  </span>
                ))}
              </div>
            </div>
          )}

          {/* MCPs (step-level) */}
          {step.mcps?.length > 0 && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>MCPs ({step.mcps.length})</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                {step.mcps.map((mcp, i) => (
                  <div key={i} style={{ background: 'var(--bg)', padding: '6px 8px', borderRadius: '4px', fontSize: '12px' }}>
                    <span style={{ color: '#a371f7' }}>{mcp.name || mcp}</span>
                    {mcp.type && <span className="text-muted" style={{ marginLeft: '8px' }}>({mcp.type})</span>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Legacy MCP field */}
          {step.mcp && !step.mcps && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>MCP</div>
              <div>{renderValue(step.mcp)}</div>
            </div>
          )}

          {/* Temperature */}
          {step.temperature !== undefined && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Temperature</div>
              <div>{step.temperature}</div>
            </div>
          )}

          {/* Max Tokens */}
          {step.maxTokens !== undefined && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Max Tokens</div>
              <div>{step.maxTokens}</div>
            </div>
          )}

          {/* Reasoning Level */}
          {step.reasoningLevel && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Reasoning Level</div>
              <div>{step.reasoningLevel}</div>
            </div>
          )}

          {/* Loop Config */}
          {step.loopConfig && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Loop Config</div>
              <div>{renderValue(step.loopConfig)}</div>
            </div>
          )}

          {/* Other properties */}
          {otherProps.length > 0 && (
            <div style={{ marginBottom: '12px' }}>
              <div className="text-muted" style={{ fontSize: '11px', textTransform: 'uppercase', marginBottom: '4px' }}>Other Properties</div>
              {otherProps.map(prop => (
                <div key={prop} style={{ marginBottom: '8px' }}>
                  <span style={{ color: '#ff7b72' }}>{prop}:</span> {renderValue(step[prop])}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Viewer Modal (Orchestration Details + Mermaid DAG) ────────────────────
    function ViewerModal({ open, orchestration, onClose, onRun }) {
      const dagRef = useRef(null);
      const [activeTab, setActiveTab] = useState('dag');
      const [fullOrchestration, setFullOrchestration] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [selectedStep, setSelectedStep] = useState(null);

      // Fetch full orchestration details when modal opens
      useEffect(() => {
        if (open && orchestration?.id) {
          setLoading(true);
          setFullOrchestration(null);
          setSelectedStep(null);
          setError(null);
          api.get(`/api/orchestrations/${orchestration.id}`)
            .then(data => {
              setFullOrchestration(data);
            })
            .catch(err => {
              console.error('Failed to load orchestration details:', err);
              setError(err.message || 'Failed to load orchestration details');
            })
            .finally(() => setLoading(false));
        }
      }, [open, orchestration?.id]);

      // Handle step click from DAG
      const handleStepClick = useCallback((stepName) => {
        const step = fullOrchestration?.steps?.find(s => 
          (typeof s === 'string' ? s : s.name) === stepName
        );
        setSelectedStep(step || { name: stepName });
      }, [fullOrchestration]);

      // Render Mermaid DAG when data is ready
      useEffect(() => {
        if (open && fullOrchestration && dagRef.current && activeTab === 'dag') {
          // Clear and create a fresh container for Mermaid to avoid React DOM conflicts
          const container = dagRef.current;
          container.innerHTML = '<div class="mermaid-inner"></div>';
          const innerContainer = container.querySelector('.mermaid-inner');
          renderMermaidDag(fullOrchestration, innerContainer, handleStepClick);
        }
      }, [open, fullOrchestration, activeTab, handleStepClick]);

      if (!orchestration) return null;

      const displayOrch = fullOrchestration || orchestration;

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div>

                                </button>
                              </div>

                            {/* Method and Content-Type */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                              <div>
                                <div className="form-label" style={{ fontSize: '12px', marginBottom: '4px' }}>Method</div>

                                  background: '#238636',

                            {/* Expected Parameters */}
                            {displayOrch.trigger.expectedParameters?.length > 0 && (
                              <div style={{ marginBottom: '16px' }}>
                                <div className="form-label" style={{ fontSize: '12px', marginBottom: '8px' }}>Expected Parameters</div>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                  {displayOrch.trigger.expectedParameters.map((param, i) => (
                                    <span key={i} style={{ 
                                      background: '#3fb9504d', 
                                      border: '1px solid #3fb950', 
                                      padding: '3px 10px', 
                                      borderRadius: '4px', 
                                      fontSize: '12px', 
                                      color: '#7ee787',
                                      fontFamily: 'monospace'
                                    }}>
                                      {param}
                                    </span>
                                  ))}
                                </div>
                              </div>

                            {/* Example cURL */}
                            <div>
                              <div className="form-label" style={{ fontSize: '12px', marginBottom: '8px' }}>Example Request</div>
                              <pre style={{ 
                                background: 'var(--bg)', 
                                padding: '12px', 
                                borderRadius: '6px', 
                                fontSize: '11px',
                                overflow: 'auto',
                                margin: 0
                              }}>
{`curl -X POST ${window.location.origin}${displayOrch.trigger.webhookUrl || `/api/webhook/${displayOrch.id}`} \\
  -H "Content-Type: application/json"${displayOrch.trigger.hasSecret ? ` \\
  -H "X-Webhook-Secret: <your-secret>"` : ''} \\
  -d '${JSON.stringify(
    (displayOrch.trigger.expectedParameters || displayOrch.parameters || []).reduce((acc, p) => {
      acc[p] = `<${p} value>`;
      return acc;
    }, {}),
    null, 2
  ).replace(/\n/g, '\n  ')}'`}
                              </pre>
                              <button 
                                className="btn btn-sm" 
                                style={{ marginTop: '8px' }}
                                onClick={() => {
                                  const curlCmd = `curl -X POST ${window.location.origin}${displayOrch.trigger.webhookUrl || `/api/webhook/${displayOrch.id}`} -H "Content-Type: application/json"${displayOrch.trigger.hasSecret ? ` -H "X-Webhook-Secret: <your-secret>"` : ''} -d '${JSON.stringify(
                                    (displayOrch.trigger.expectedParameters || displayOrch.parameters || []).reduce((acc, p) => {
                                      acc[p] = `<${p} value>`;
                                      return acc;
                                    }, {})
                                  )}'`;
                                  navigator.clipboard.writeText(curlCmd);

                              </button>

                            {/* Input Handler note */}
                            {displayOrch.trigger.hasInputHandler && (
                              <div style={{ marginTop: '16px', padding: '10px', background: '#1f6feb33', borderRadius: '6px', border: '1px solid #1f6feb' }}>
                                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', color: '#58a6ff', fontSize: '12px' }}>
                                  <Icons.Sparkles style={{ flexShrink: 0, marginTop: '2px' }} />
                                  <span>This webhook has an <strong>input handler</strong> that uses an LLM to parse the raw payload. You can send any JSON structure and it will be intelligently extracted.</span>
                                </div>
                              </div>
                            )}
                          </div>
                        </div>
                      )}

                      <div className="form-group">
                        <label className="form-label">Steps ({displayOrch.steps?.length || 0})</label>
                        {displayOrch.steps?.map((step, i) => (
                          <div key={i} style={{ padding: '8px 12px', background: 'var(--surface)', borderRadius: '6px', marginBottom: '8px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                              <strong>{typeof step === 'string' ? step : step.name}</strong>
                              {step.inputHandlerPrompt && (
                                <span style={{ color: '#3fb950', fontSize: '11px' }} title="Has Input Handler">⇢</span>
                              )}
                              {step.outputHandlerPrompt && (
                                <span style={{ color: '#58a6ff', fontSize: '11px' }} title="Has Output Handler">⇠</span>
                              )}
                            </div>
                            {step.dependsOn?.length > 0 && (
                              <span className="text-muted" style={{ fontSize: '12px' }}>
                                depends on: {step.dependsOn.join(', ')}
                              </span>
                            )}
                            {step.parameters?.length > 0 && (
                              <div style={{ marginTop: '4px' }}>
                                <span className="text-muted" style={{ fontSize: '11px' }}>params: </span>
                                {step.parameters.map((p, j) => (
                                  <span key={j} style={{ 
                                    background: '#3fb9503d', 
                                    padding: '1px 6px', 
                                    borderRadius: '3px', 
                                    fontSize: '11px', 
                                    marginRight: '4px',
                                    color: '#7ee787'
                                  }}>
                                    {typeof p === 'string' ? p : p.name}
                                  </span>
                                ))}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {activeTab === 'json' && (
                    <pre style={{ background: 'var(--surface)', padding: '16px', borderRadius: '8px', overflow: 'auto', fontSize: '12px' }}>
                      {JSON.stringify(displayOrch, null, 2)}
                    </pre>
                  )}
                </>
              )}
            </div>
            <div className="modal-footer">
              {(!displayOrch.triggerType || displayOrch.triggerType === 'Manual') && onRun && (
                <button className="btn btn-success" onClick={onRun} style={{ marginRight: 'auto' }}>
                  <Icons.Play /> Run Now
                </button>
              )}
              <button className="btn" onClick={onClose}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── History Modal ─────────────────────────────────────────────────────────
    function HistoryModal({ open, onClose, onAttachToExecution, onViewExecution, orchestrations }) {
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (open) {
          setLoading(true);
          api.get('/api/history?limit=100')
            .then(data => setHistory(data.runs || []))
            .finally(() => setLoading(false));
        }
      }, [open]);

      const handleClick = (exec) => {
        if (exec.isActive && exec.executionId && onAttachToExecution) {
          // For running executions, attach to the live stream
          // Pass the full exec object (which has executionId, orchestrationId, parameters, etc.)
          // and look up the orchestration object from the orchestrations list
          const orch = orchestrations?.find(o => o.id === exec.orchestrationId);
          onClose();
          onAttachToExecution(exec, orch);
        } else if (onViewExecution) {
          // For completed executions, show the execution modal
          onClose();
          onViewExecution(exec);
        }
      };

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">Execution History</div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="modal-body">
              {loading ? (
                <div className="empty-state"><div className="spinner"></div></div>
              ) : history.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-title">No Execution History</div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  {history.map(exec => (
                    <div 
                      key={exec.runId} 
                      className="history-item" 
                      style={{ background: 'var(--surface)', borderRadius: '6px', cursor: 'pointer' }}
                      onClick={() => handleClick(exec)}
                    >
                      <div className={`history-status-icon ${exec.status?.toLowerCase() || 'running'}`}>
                        {exec.isActive ? (
                          <span className="spinner" style={{ width: '12px', height: '12px' }}></span>
                        ) : exec.status === 'Succeeded' ? (
                          <Icons.Check />
                        ) : exec.status === 'Failed' ? (
                          <Icons.X />
                        ) : exec.status === 'Cancelled' ? (
                          <Icons.X />
                        ) : (
                          '...'
                        )}
                      </div>
                      <div className="history-info">
                        <div className="history-name">
                          {exec.orchestrationName}
                          {exec.isActive && (
                            <span className="step-status-badge running" style={{ 
                              marginLeft: '8px', 
                              fontSize: '10px',
                              padding: '2px 6px'
                            }}>
                              {exec.status === 'Cancelling' ? 'Cancelling' : 'Running'}
                            </span>
                          )}
                        </div>
                        <div className="history-time">{formatTime(exec.startedAt)}</div>
                      </div>
                      <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                        {exec.isActive ? 'In progress' : `${exec.durationSeconds}s`}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={onClose}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Active Orchestrations Modal ───────────────────────────────────────────
    function ActiveModal({ open, data, loading, onClose, onRefresh, orchestrations, onViewOrchestration, onViewRunningExecution, onCancelExecution }) {
      const handleViewOrchestration = (exec, isRunning = false) => {
        const orch = orchestrations?.find(o => o.id === exec.orchestrationId);
        if (isRunning && onViewRunningExecution) {
          // For running executions, open the running execution modal
          onViewRunningExecution(exec, orch);
        } else if (orch && onViewOrchestration) {
          // For pending, open the viewer modal
          onViewOrchestration(orch);
        }
      };

      const running = data?.running || [];
      const pending = data?.pending || [];

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">
                <Icons.Activity /> Active Orchestrations
              </div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="modal-body" style={{ minHeight: '300px' }}>
              {loading ? (
                <div className="empty-state"><div className="spinner"></div></div>
              ) : (
                <>
                  {/* Running Section */}
                  <div style={{ marginBottom: '20px' }}>
                    <div style={{ fontSize: '14px', fontWeight: '600', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                      <span className="step-status-badge running" style={{ width: '8px', height: '8px', borderRadius: '50%' }}></span>
                      Running ({running.length})
                    </div>
                    {running.length === 0 ? (
                      <div style={{ color: 'var(--text-muted)', fontSize: '13px', padding: '10px', background: 'var(--surface)', borderRadius: '6px' }}>
                        No orchestrations currently running.
                      </div>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        {running.map(exec => (
                          <div 
                            key={exec.executionId} 
                            className="history-item" 
                            style={{ 
                              background: 'var(--surface)', 
                              borderRadius: '6px', 
                              borderLeft: '3px solid var(--primary)',
                              cursor: 'pointer'
                            }}
                            onClick={() => handleViewOrchestration(exec, true)}
                          >
                            <div className="history-status-icon running" style={{ background: 'var(--primary)', color: 'white' }}>
                              <Icons.Spinner />
                            </div>
                            <div className="history-info" style={{ flex: 1 }}>
                              <div className="history-name">{exec.orchestrationName}</div>
                              <div className="history-time" style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                {getTriggerIcon(exec.triggeredBy)}
                                <span>{exec.triggeredBy}</span>
                                <span style={{ margin: '0 4px' }}>•</span>
                                <span>{formatTimeAgo(exec.startedAt)}</span>
                              </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                              <div style={{ fontSize: '11px', color: 'var(--text-muted)', fontFamily: 'monospace' }}>
                                {exec.executionId?.slice(0, 8)}...
                              </div>
                              {onCancelExecution && (
                                <button 
                                  className="btn btn-danger btn-sm" 
                                  onClick={(e) => { e.stopPropagation(); onCancelExecution(exec.executionId); }}
                                  style={{ padding: '4px 8px', fontSize: '11px' }}
                                >
                                  <Icons.X /> Cancel
                                </button>
                              )}
                              <button 
                                className="btn btn-sm" 
                                onClick={(e) => { e.stopPropagation(); handleViewOrchestration(exec, true); }}
                                style={{ padding: '4px 8px', fontSize: '11px' }}
                              >
                                <Icons.Eye /> View
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Pending Section */}
                  <div>
                    <div style={{ fontSize: '14px', fontWeight: '600', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                      <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: 'var(--warning)' }}></span>
                      Pending Triggers ({pending.length})
                    </div>
                    {pending.length === 0 ? (
                      <div style={{ color: 'var(--text-muted)', fontSize: '13px', padding: '10px', background: 'var(--surface)', borderRadius: '6px' }}>
                        No orchestrations pending trigger.
                      </div>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                        {pending.map((t, idx) => (
                          <div 
                            key={t.orchestrationId || idx} 
                            className="history-item" 
                            style={{ 
                              background: 'var(--surface)', 
                              borderRadius: '6px', 
                              borderLeft: '3px solid var(--warning)',
                              cursor: 'pointer'
                            }}
                            onClick={() => handleViewOrchestration(t)}
                          >
                            <div className="history-status-icon" style={{ background: 'var(--warning)', color: 'white' }}>
                              <Icons.Clock />
                            </div>
                            <div className="history-info" style={{ flex: 1 }}>
                              <div className="history-name">{t.orchestrationName}</div>
                              <div className="history-time" style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                {getTriggerIcon(t.triggeredBy)}
                                <span>{t.triggeredBy}</span>
                              </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                              <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                Next: {t.nextFireTime ? new Date(t.nextFireTime).toLocaleString() : 'Unknown'}
                              </div>
                              <button 
                                className="btn btn-sm" 
                                onClick={(e) => { e.stopPropagation(); handleViewOrchestration(t); }}
                                style={{ padding: '4px 8px', fontSize: '11px' }}
                              >
                                <Icons.Eye /> View
                              </button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary" onClick={onRefresh}>Refresh</button>
              <button className="btn" onClick={onClose}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Add Orchestrations Modal ──────────────────────────────────────────────
    function AddModal({ open, onClose, onAdded }) {
      const [activeTab, setActiveTab] = useState('browse');
      const [path, setPath] = useState('');
      const [files, setFiles] = useState([]);
      const [selectedFiles, setSelectedFiles] = useState([]);
      const [jsonContent, setJsonContent] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const browseFolder = async () => {
        if (!path) return;
        setLoading(true);
        setError('');
        try {
          const data = await api.post('/api/folder/scan', { directory: path });
          setFiles(data.orchestrations || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const toggleFile = (file) => {
        setSelectedFiles(prev => 
          prev.includes(file) ? prev.filter(f => f !== file) : [...prev, file]
        );
      };

      const addOrchestrations = async () => {
        setLoading(true);
        setError('');
        try {
          if (activeTab === 'browse') {
            await api.post('/api/orchestrations/add', { paths: selectedFiles });
          } else {
            await api.post('/api/orchestrations/add-json', { json: jsonContent });
          }
          onAdded();
          onClose();
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Add Orchestrations</div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="tabs">
              <div className={`tab ${activeTab === 'browse' ? 'active' : ''}`} onClick={() => setActiveTab('browse')}>Browse Files</div>
              <div className={`tab ${activeTab === 'paste' ? 'active' : ''}`} onClick={() => setActiveTab('paste')}>Paste JSON</div>
            </div>
            <div className="modal-body">
              {error && (
                <div style={{ background: 'rgba(248, 81, 73, 0.15)', border: '1px solid var(--error)', borderRadius: '6px', padding: '12px', marginBottom: '16px', color: 'var(--error)' }}>
                  {error}
                </div>
              )}
              
              {activeTab === 'browse' && (
                <>
                  <div className="form-group">
                    <label className="form-label">Folder Path</label>
                    <div style={{ display: 'flex', gap: '8px' }}>
                      <input 
                        type="text" 
                        className="form-input" 
                        placeholder="Enter folder path..." 
                        value={path}
                        onChange={(e) => setPath(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && browseFolder()}
                      />
                      <button className="btn btn-primary" onClick={browseFolder} disabled={loading}>
                        {loading ? <div className="spinner"></div> : 'Browse'}
                      </button>
                    </div>
                  </div>
                  
                  {files.length > 0 && (
                    <div className="form-group">
                      <label className="form-label">Select Orchestration Files ({selectedFiles.length} selected)</label>
                      <div className="file-browser">
                        {files.map((file, i) => (
                          <div 
                            key={i} 
                            className={`file-item ${selectedFiles.includes(file.path) ? 'selected' : ''} ${!file.valid ? 'invalid' : ''}`}
                            onClick={() => file.valid && toggleFile(file.path)}
                            title={file.valid ? file.name : file.error}
                          >
                            <span className="file-icon"><Icons.File /></span>
                            <span className="file-name">{file.fileName}</span>
                            {file.valid && <span className="file-orch-name" style={{ color: 'var(--text-muted)', fontSize: '11px', marginLeft: 'auto' }}>{file.name}</span>}
                            {!file.valid && <span style={{ color: 'var(--error)', fontSize: '11px', marginLeft: 'auto' }}>Invalid</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}

              {activeTab === 'paste' && (
                <div className="form-group">
                  <label className="form-label">Orchestration JSON</label>
                  <textarea 
                    className="form-textarea" 
                    placeholder='Paste your orchestration JSON here...'
                    value={jsonContent}
                    onChange={(e) => setJsonContent(e.target.value)}
                    style={{ minHeight: '300px' }}
                  />
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={onClose}>Cancel</button>
              <button 
                className="btn btn-primary" 
                onClick={addOrchestrations} 
                disabled={loading || (activeTab === 'browse' ? selectedFiles.length === 0 : !jsonContent.trim())}
              >
                {loading ? <div className="spinner"></div> : 'Add Orchestrations'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Run Modal (Parameters) ────────────────────────────────────────────────
    function RunModal({ open, orchestration, onClose, onSubmit }) {
      const [params, setParams] = useState({});

      useEffect(() => {
        if (orchestration?.parameters) {
          const initial = {};
          // Parameters are an array of strings (parameter names)
          orchestration.parameters.forEach(p => { 
            const paramName = typeof p === 'string' ? p : p.name;
            initial[paramName] = ''; 
          });
          setParams(initial);
        }
      }, [orchestration]);

      if (!orchestration) return null;

      // Normalize parameters to array of {name, description} objects
      const parameterList = (orchestration.parameters || []).map(p => 
        typeof p === 'string' ? { name: p, description: '' } : p
      );

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-sm">
            <div className="modal-header">
              <div className="modal-title">Run {orchestration.name}</div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="modal-body">
              <p className="text-muted" style={{ marginBottom: '16px' }}>
                Enter parameters for this orchestration:
              </p>
              {parameterList.map((param, i) => (
                <div className="form-group" key={i}>
                  <label className="form-label">{param.name}</label>
                  <input 
                    type="text" 
                    className="form-input" 
                    placeholder={param.description || `Enter ${param.name}`}
                    value={params[param.name] || ''}
                    onChange={(e) => setParams(prev => ({ ...prev, [param.name]: e.target.value }))}
                  />
                </div>
              ))}
            </div>
            <div className="modal-footer">
              <button className="btn" onClick={onClose}>Cancel</button>
              <button className="btn btn-success" onClick={() => onSubmit(params)}>
                <Icons.Play /> Run
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Execution Modal (Live DAG + Events + Streaming) ─────────────────────────
    function ExecutionModal({ open, orchestration, executionId, stepStatuses, stepEvents, stepResults, streamingContent, finalResult, status, errorMessage, onClose, onCancel }) {
      const dagRef = useRef(null);
      const streamingEndRef = useRef(null);
      const [selectedStep, setSelectedStep] = useState(null);
      
      // Determine if execution is completed
      const isCompleted = ['success', 'failed', 'cancelled'].includes(status);
      
      // Determine what content to show in the output panel
      const displayContent = useMemo(() => {
        // If a step is selected and we have its result, show it
        if (selectedStep && stepResults && stepResults[selectedStep]) {
          return { content: stepResults[selectedStep], source: 'step' };
        }
        // Otherwise show streaming content or final result
        if (isCompleted && finalResult) {
          return { content: finalResult, source: 'final' };
        }
        return { content: streamingContent || '', source: 'streaming' };
      }, [selectedStep, stepResults, streamingContent, finalResult, isCompleted]);
      
      // Copy content to clipboard
      const copyContent = () => {
        if (displayContent.content) {
          navigator.clipboard.writeText(displayContent.content);
        }
      };
      
      // Download content as file
      const downloadContent = () => {
        if (displayContent.content) {
          const blob = new Blob([displayContent.content], { type: 'text/plain' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const filename = selectedStep 
            ? `${orchestration?.name || 'orchestration'}_${selectedStep}_output.txt`
            : `${orchestration?.name || 'orchestration'}_result.txt`;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      };

      // Render DAG when orchestration or step statuses change
      useEffect(() => {
        if (open && dagRef.current && orchestration) {
          renderExecutionDag(orchestration, stepStatuses || {}, dagRef.current, setSelectedStep, selectedStep);
        }
      }, [open, orchestration, stepStatuses, selectedStep]);

      // Auto-scroll streaming content
      useEffect(() => {
        streamingEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [streamingContent]);

      // Get events for selected step
      const selectedStepEvents = selectedStep && stepEvents ? (stepEvents[selectedStep] || []) : [];
      const selectedStepStatus = selectedStep && stepStatuses ? (stepStatuses[selectedStep] || 'pending') : null;
      
      // Get selected step data (including MCPs)
      const selectedStepData = useMemo(() => {
        if (!selectedStep || !orchestration?.steps) return null;
        const step = orchestration.steps.find(s => 
          (typeof s === 'string' ? s : s?.name) === selectedStep
        );
        return typeof step === 'object' ? step : null;
      }, [selectedStep, orchestration]);

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="flex items-center gap-2">
                <div className="modal-title">
                  {orchestration ? `Execution: ${orchestration.name}` : 'Running Orchestration'}
                </div>
                {status === 'loading' && <div className="spinner"></div>}
                {status === 'running' && <div className="spinner"></div>}
                {status === 'cancelling' && (
                  <>
                    <div className="spinner" style={{ borderTopColor: 'var(--warning)' }}></div>
                    <span className="text-warning">Cancelling...</span>
                  </>
                )}
                {status === 'success' && <span className="text-success">Completed</span>}
                {status === 'failed' && <span className="text-error">Failed</span>}
                {status === 'cancelled' && <span className="text-warning">Cancelled</span>}
                {status === 'error' && <span className="text-error">Error</span>}
              </div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="modal-body" style={{ padding: 0 }}>
              {/* Error Message Display */}
              {status === 'error' && errorMessage && (
                <div style={{
                  padding: '12px 16px',
                  background: 'rgba(248, 81, 73, 0.1)',
                  borderBottom: '1px solid var(--error)',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '12px'
                }}>
                  <Icons.X />
                  <div style={{ flex: 1 }}>
                    <div style={{ color: 'var(--error)', fontWeight: 500, marginBottom: '2px' }}>Error</div>
                    <div style={{ color: 'var(--text-muted)', fontSize: '13px' }}>{errorMessage}</div>
                  </div>
                </div>
              )}
              <div className="execution-modal-content">
                {/* DAG Section */}
                <div className="execution-dag-section" ref={dagRef}>
                  {!orchestration && (
                    <div className="empty-state">
                      <div className="spinner"></div>
                      <div className="empty-text" style={{ marginTop: '8px' }}>Loading orchestration...</div>
                    </div>
                  )}
                </div>
                
                {/* Details Section: Step Events + Streaming Output */}
                <div className="execution-details-section">
                  {/* Step Events Panel */}
                  <div className="execution-step-events">
                    {selectedStep ? (
                      <>
                        <div className="selected-step-header">
                          <span>{selectedStep}</span>
                          {selectedStepStatus && (
                            <span className={`step-status-badge ${selectedStepStatus}`} style={{ marginLeft: '8px' }}>
                              {selectedStepStatus}
                            </span>
                          )}
                        </div>
                        
                        {/* Step Info: Type, Model, MCPs */}
                        {selectedStepData && (
                          <div className="step-info-section" style={{ 
                            padding: '8px 12px', 
                            background: 'var(--bg-tertiary)', 
                            borderRadius: '6px',
                            marginBottom: '8px',
                            fontSize: '12px'
                          }}>
                            <div style={{ display: 'flex', gap: '16px', flexWrap: 'wrap', marginBottom: selectedStepData.mcps?.length > 0 ? '8px' : '0' }}>
                              {selectedStepData.type && (
                                <div><span style={{ color: 'var(--text-dim)' }}>Type:</span> <span style={{ color: 'var(--text-secondary)' }}>{selectedStepData.type}</span></div>
                              )}
                              {selectedStepData.model && (
                                <div><span style={{ color: 'var(--text-dim)' }}>Model:</span> <span style={{ color: 'var(--text-secondary)' }}>{selectedStepData.model}</span></div>
                              )}
                            </div>
                            {selectedStepData.mcps && selectedStepData.mcps.length > 0 && (
                              <div>
                                <span style={{ color: 'var(--text-dim)' }}>MCPs:</span>
                                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', marginTop: '4px' }}>
                                  {selectedStepData.mcps.map((mcp, i) => (
                                    <span key={i} style={{ 
                                      background: 'var(--bg-secondary)', 
                                      padding: '2px 8px', 
                                      borderRadius: '4px',
                                      color: 'var(--accent)',
                                      border: '1px solid var(--border-subtle)'
                                    }}>
                                      {mcp.name || mcp}
                                    </span>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                        
                        {selectedStepEvents.length === 0 ? (
                          <div className="no-step-selected">No events yet for this step</div>
                        ) : (
                          selectedStepEvents.map((event, i) => (
                            <div className={`step-event-item ${event.type}`} key={i}>
                              <span className="event-type">{event.type}</span>
                              <span className="event-time" style={{ color: 'var(--text-dim)', marginRight: '8px' }}>{event.time}</span>
                              <span className="event-content" style={{ color: 'var(--text-muted)' }}>
                                {formatLogContent(event)}
                              </span>
                            </div>
                          ))
                        )}
                      </>
                    ) : (
                      <div className="no-step-selected">
                        Click a step in the DAG to view its events
                      </div>
                    )}
                  </div>
                  
                  {/* Output/Result Panel */}
                  <div className="execution-streaming">
                    <div className="streaming-header">
                      {isCompleted ? <Icons.Check /> : <Icons.Terminal />}
                      <span>
                        {selectedStep 
                          ? `Step Output: ${selectedStep}`
                          : (isCompleted ? 'Result' : 'Agent Output')
                        }
                      </span>
                      {status === 'running' && !selectedStep && <div className="spinner" style={{ width: '14px', height: '14px' }}></div>}
                      {/* Copy and Download buttons */}
                      {displayContent.content && (
                        <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px' }}>
                          <button 
                            className="btn-icon" 
                            onClick={copyContent}
                            title="Copy to clipboard"
                            style={{ padding: '4px 8px', fontSize: '12px' }}
                          >
                            <Icons.Copy />
                          </button>
                          <button 
                            className="btn-icon" 
                            onClick={downloadContent}
                            title="Download as file"
                            style={{ padding: '4px 8px', fontSize: '12px' }}
                          >
                            <Icons.Download />
                          </button>
                        </div>
                      )}
                    </div>
                    <div className="streaming-content">
                      {displayContent.content ? (
                        displayContent.content
                      ) : (
                        <span style={{ color: 'var(--text-dim)' }}>
                          {status === 'running' 
                            ? (selectedStep ? 'No output yet for this step...' : 'Running...')
                            : 'No output captured'
                          }
                        </span>
                      )}
                      <div ref={streamingEndRef} />
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              {(status === 'running' || status === 'cancelling') && (
                <button 
                  className="btn btn-warning" 
                  onClick={onCancel}
                  disabled={status === 'cancelling'}
                  style={{ marginRight: 'auto' }}
                >
                  {status === 'cancelling' ? 'Cancelling...' : 'Cancel Execution'}
                </button>
              )}
              <button className="btn" onClick={onClose}>Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── MCPs Modal (All MCP Tools) ─────────────────────────────────────────────
    function McpsModal({ open, onClose }) {
      const [mcps, setMcps] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedMcp, setExpandedMcp] = useState(null);

      useEffect(() => {
        if (open) {
          setLoading(true);
          api.get('/api/mcps')
            .then(data => setMcps(data.mcps || []))
            .catch(err => console.error('Failed to load MCPs:', err))
            .finally(() => setLoading(false));
        }
      }, [open]);

      const filteredMcps = useMemo(() => {
        if (!searchQuery) return mcps;
        const q = searchQuery.toLowerCase();
        return mcps.filter(m => 
          m.name?.toLowerCase().includes(q) ||
          m.type?.toLowerCase().includes(q) ||
          m.endpoint?.toLowerCase().includes(q) ||
          m.command?.toLowerCase().includes(q)
        );
      }, [mcps, searchQuery]);

      return (
        <div className={`modal-overlay ${open ? 'visible' : ''}`} onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="modal modal-lg">
            <div className="modal-header">
              <div className="modal-title">MCP Tools ({mcps.length})</div>
              <button className="modal-close" onClick={onClose}><Icons.X /></button>
            </div>
            <div className="modal-body">
              {/* Search */}
              <div className="search-box" style={{ marginBottom: '16px' }}>
                <span className="search-icon"><Icons.Search /></span>
                <input 
                  type="text" 
                  placeholder="Search MCPs..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>

              {loading ? (
                <div className="empty-state"><div className="spinner"></div></div>
              ) : filteredMcps.length === 0 ? (
                <div className="empty-state">
                  <div className="empty-title">No MCPs Found</div>
                  <div className="empty-text">
                    {mcps.length === 0 
                      ? 'No MCP tools are registered across any orchestration.' 
                      : 'No MCPs match your search query.'}
                  </div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                  {filteredMcps.map((mcp, i) => (
                    <div 
                      key={i} 
                      style={{ 
                        background: 'var(--surface)', 
                        borderRadius: '8px',
                        border: '1px solid var(--border)',
                        overflow: 'hidden'
                      }}
                    >
                      <div 
                        style={{ 
                          padding: '12px 16px',
                          cursor: 'pointer',
                          display: 'flex',
                          justifyContent: 'space-between',
                          alignItems: 'center'
                        }}
                        onClick={() => setExpandedMcp(expandedMcp === mcp.name ? null : mcp.name)}
                      >
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <div style={{ 
                            width: '8px', 
                            height: '8px', 
                            borderRadius: '50%', 
                            background: mcp.type === 'Remote' ? '#58a6ff' : '#3fb950'
                          }} />
                          <div>
                            <div style={{ fontWeight: 500, color: '#a371f7' }}>{mcp.name}</div>
                            <div className="text-muted" style={{ fontSize: '12px' }}>
                              {mcp.type === 'Remote' ? mcp.endpoint : mcp.command}
                            </div>
                          </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                          <span className={`badge badge-${mcp.type?.toLowerCase() || 'local'}`}>
                            {mcp.type}
                          </span>
                          <span className="text-muted" style={{ fontSize: '12px' }}>
                            Used by {mcp.usedByCount} orchestration{mcp.usedByCount !== 1 ? 's' : ''}
                          </span>
                          <span style={{ color: 'var(--text-muted)', transform: expandedMcp === mcp.name ? 'rotate(90deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>
                            ▶
                          </span>

                      </div>
                      
                      {expandedMcp === mcp.name && (
                        <div style={{ 
                          padding: '12px 16px', 
                          borderTop: '1px solid var(--border)',
                          background: 'var(--bg-secondary)'
                        }}>
