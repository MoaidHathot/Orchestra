# yaml-language-server: $schema=../schemas/orchestration.schema.json
name: icm-auto-acknowledge
description: >
  Periodically checks for active IcM incidents (Sev 3+) that have not been
  acknowledged, acknowledges each one via the IcM MCP server, creates an
  ActionView entry summarizing what was done, and produces a final markdown
  summary. Runs every 15 seconds. Uses a gate step to complete early if no
  unacknowledged incidents are found.

mcps:
  - name: icm
    type: local
    command: dnx
    arguments:
      - IcM.Mcp
      - --source
      - https://pkgs.dev.azure.com/msazure/One/_packaging/ZTS/nuget/v3/index.json
      - --yes

steps:
  - name: fetch-active-incidents
    type: Command
    dependsOn: []
    command: dnx
    arguments:
      - Icm.Cli
      - --source
      - https://pkgs.dev.azure.com/msazure/One/_packaging/ZTS/nuget/v3/index.json
      - --yes
      - --
      - incidents
      - --acknowledged
      - "no"
      - --states
      - ACTIVE
      - --severity
      - "3"
    timeoutSeconds: 120

  - name: check-incidents
    type: Prompt
    dependsOn:
      - fetch-active-incidents
    model: claude-opus-4.6
    timeoutSeconds: 40
    mcps: []
    systemPrompt: >
      You are a gate-check assistant. Your ONLY job is to determine whether
      there are any unacknowledged incidents in the provided data. You have
      access to the orchestra_complete tool. If there are NO unacknowledged
      incidents, call orchestra_complete with status 'success' and a reason
      explaining that no action is needed. If there ARE unacknowledged
      incidents, output the text 'Proceeding with acknowledgment' and do
      nothing else.
    userPrompt: |
      Review the following incident data and determine if any incidents are NOT yet acknowledged:

      {{fetch-active-incidents.output}}

      If ALL incidents are already acknowledged (or there are no incidents at all), use the orchestra_complete tool to stop the orchestration early with status 'success'. Otherwise, output 'Proceeding with acknowledgment'.

  - name: acknowledge-incidents
    type: Prompt
    dependsOn:
      - check-incidents
    model: claude-opus-4.6
    enabled: false
    timeoutSeconds: 120
    mcps:
      - icm
    systemPrompt: >
      You are an IcM incident management assistant. You have tools available
      to interact with IcM incidents -- these tools are provided via MCP and
      will appear in your tool list. Examine your available tools to find the
      one(s) that can acknowledge incidents, then use them. Do NOT claim you
      lack tools without first checking your tool list. If you truly have no
      tools available, use the orchestra_set_status tool to mark this step as
      failed with a reason explaining which tools you expected.
      Only acknowledge incidents that are Severity 3 or higher (3, 4, 5, etc.).
      Skip any incident with Severity 1 or 2.
    userPrompt: |
      The following is the list of currently active IcM incidents:

      {{fetch-active-incidents.output}}

      For each incident that is NOT acknowledged yet in this list and has a severity of 3 or higher, find the appropriate tool in your tool list to acknowledge it, and call it. Do NOT acknowledge Sev 1 or Sev 2 incidents. After acknowledging all qualifying incidents, output ONLY a JSON array of the incident IDs that you successfully acknowledged. The output must be a valid JSON array of numbers or strings, e.g. [12345, 67890]. Do not include any other text outside the JSON array.

  - name: fetch-action-view-schema
    type: Command
    dependsOn: []
    command: dnx
    arguments:
      - ActionView.Cli
      - --source
      - https://pkgs.dev.azure.com/msazure/One/_packaging/ZTS/nuget/v3/index.json
      - --yes
      - --
      - schema
    timeoutSeconds: 120

  - name: create-action-view-entry
    type: Prompt
    dependsOn:
      - fetch-active-incidents
      - acknowledge-incidents
      - fetch-action-view-schema
    model: claude-opus-4.6
    timeoutSeconds: 120
    mcps: []
    systemPrompt: >
      You are an ActionView entry generator. Your job is to create a
      structured JSON entry for ActionView that documents actions taken on
      IcM incidents. You are given the ActionView entry schema and must
      generate an entry that strictly conforms to it. Output ONLY the raw
      JSON content of the entry -- no markdown fences, no explanation, no
      surrounding text.
    userPrompt: |
      You have the ActionView entry schema, the list of active incidents, and the IDs of incidents that were acknowledged. Create a single ActionView entry that:

      1. Has a clear title like "IcM Incidents Acknowledged" with a timestamp.
      2. Starts with a summary table at the beginning containing columns: Incident ID, Title, Environment/Region, and Action ("Acknowledged").
      3. Contains sub-entries for each acknowledged incident showing the important details: title, environment, region, severity, and the action taken ("Acknowledged"). Do not include the entire raw incident data -- only the key fields that matter.

      ActionView entry schema:
      {{fetch-action-view-schema.output}}

      Active incidents data:
      {{fetch-active-incidents.output}}

      Acknowledged incident IDs:
      {{acknowledge-incidents.output}}

      Output ONLY the valid JSON content of the generated ActionView entry, conforming to the schema above. No markdown, no explanation

  - name: save-action-view-entry
    type: Prompt
    dependsOn:
      - create-action-view-entry
    model: claude-opus-4.6
    timeoutSeconds: 120
    mcps: []
    systemPrompt: >
      You are an ActionView entry Handler. You get the json schema from the
      previous step, you need to save it using orchestra_save-file then
      return the generated path. Only return the generated path (response
      from call tooling), nothing else
    userPrompt: |
      {{create-action-view-entry.output}}

      Save this content to a file using the orchestra_save-file tool. Return ONLY the file path returned by the tool, with no additional text.

  - name: submit-action-view-entry
    type: Command
    dependsOn:
      - save-action-view-entry
    command: dnx
    arguments:
      - ActionView.Cli
      - --source
      - https://pkgs.dev.azure.com/msazure/One/_packaging/ZTS/nuget/v3/index.json
      - --yes
      - --
      - add
      - --file
      - "{{create-action-view-entry.output}}"
    stdin: "{{create-action-view-entry.output}}"
    timeoutSeconds: 120

  - name: generate-summary
    type: Prompt
    dependsOn:
      - fetch-active-incidents
      - acknowledge-incidents
      - create-action-view-entry
      - submit-action-view-entry
    model: claude-opus-4.6
    timeoutSeconds: 120
    mcps: []
    systemPrompt: >
      You are a reporting assistant. You produce clear, elegant markdown
      summaries of automated actions taken on IcM incidents. Use tables,
      headers, and formatting to make the output easy to scan and
      professional.
    userPrompt: |
      Create a final markdown summary of the IcM Auto-Acknowledge orchestration run. You have the following data:

      **Active incidents fetched:**
      {{fetch-active-incidents.output}}

      **Acknowledged incident IDs:**
      {{acknowledge-incidents.output}}

      **ActionView entry created:**
      {{create-action-view-entry.output}}

      **ActionView submission result:**
      {{submit-action-view-entry.output}}

      Produce a polished markdown report that includes:
      1. A header with the orchestration name and timestamp.
      2. A summary line (e.g., "X incidents acknowledged").
      3. A table of all incidents with columns: Incident ID, Title, Environment/Region, Severity, Status (Acknowledged).
      4. A section confirming the ActionView entry was submitted successfully.
      5. Any errors or issues encountered (or confirm none).

      Use clean markdown with tables, horizontal rules, and headers for easy readability.

trigger:
  type: scheduler
  enabled: true
  intervalSeconds: 15
